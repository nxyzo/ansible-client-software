# tasks file for win-adobe-reader
- name: Starte PSADT silent Uninstall
  win_shell: |
    & "{{ package_source_path }}\Invoke-AppDeployToolkit.exe" `
      -DeploymentType Uninstall `
      -DeployMode Silent
  register: deploy_result
  failed_when: deploy_result.rc not in [0, 3010]

- name: Detect installation after uninstall
  win_shell: >
    powershell.exe -ExecutionPolicy Bypass -File
    "{{ package_source_path }}\detect-installation.ps1"
  register: detect_after
  failed_when: detect_after.rc not in [0, 1]
  #when: detect.rc == 0

- name: Show installation result
  debug:
    msg: >-
      Adobe Reader ist {{
      'deinstalliert' if detect_after.rc == 1
      else 'noch installiert'
      }}.
  #when: detect_after == 0

- name: Set Adobe Reader enterprise baseline under HKLM policies
  ansible.windows.win_regedit:
    path: "{{ item.path }}"
    name: "{{ item.name }}"
    data: "{{ item.data }}"
    type: dword
    state: present
  loop:
    # FeatureLockDown
    - { path: "{{ adobe_reader_featurelockdown_base }}", name: "bProtectedMode",                    data: 0 }
    - { path: "{{ adobe_reader_featurelockdown_base }}", name: "bEnableProtectedModeAppContainer",  data: 0 }
    - { path: "{{ adobe_reader_featurelockdown_base }}", name: "bSuppressSignOut",                  data: 0 }
    - { path: "{{ adobe_reader_featurelockdown_base }}", name: "bToggleFTE",                        data: 0 }
    - { path: "{{ adobe_reader_featurelockdown_base }}", name: "bToggleToDoList",                   data: 0 }
    - { path: "{{ adobe_reader_featurelockdown_base }}", name: "bToggleToDoTiles",                  data: 0 }
    - { path: "{{ adobe_reader_featurelockdown_base }}", name: "bAcroSuppressUpsell",               data: 0 }
    - { path: "{{ adobe_reader_featurelockdown_base }}", name: "bWhatsNewExp",                      data: 0 }
    - { path: "{{ adobe_reader_featurelockdown_base }}", name: "bUpdater",                          data: 1 }